<!DOCTYPE html>
<html>

<head>
    <title>Novo Produto</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'controle/style.css' %}">
</head>

<body>
    <div class="container">
        <h1>Cadastrar novo produto</h1>

        {% if erro %}
        <p class="mensagem-erro">{{ erro }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Código:</label>
                <input type="text" name="codigo">
            </div>

            <div class="form-group">
                <label>Nome:</label>
                <input type="text" name="nome">
            </div>

            <div class="form-group">
                <label>Categoria:</label>
                <input type="text" name="categoria">
            </div>

            <div class="form-group">
                <label>Estoque mínimo:</label>
                <input type="number" name="estoque_minimo" value="0">
            </div>

            <button type="submit">Salvar</button>
        </form>

        <br>
        <a href="{% url 'lista_produtos' %}">Voltar para lista</a>
    </div>
</body>

</html>
