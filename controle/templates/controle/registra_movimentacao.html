<!DOCTYPE html>
<html>

<head>
    <title>Movimentar Estoque</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'controle/style.css' %}">
</head>

<body>
    <div class="container">
        <h1>Movimentar estoque - {{ produto.nome }} ({{ produto.codigo }})</h1>

        {% if messages %}
        <ul>
            {% for message in messages %}
            <li class="mensagem-{% if message.tags == 'error' %}erro{% else %}sucesso{% endif %}">
                {{ message }}
            </li>
            {% endfor %}
        </ul>
        {% endif %}

        <p>Saldo atual: {{ produto.quantidade_atual }}</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Tipo:</label>
                <select name="tipo">
                    <option value="E">Entrada</option>
                    <option value="S">Saída</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" name="quantidade" min="1">
            </div>

            <div class="form-group">
                <label>Observação:</label>
                <textarea name="observacao"></textarea>
            </div>

            <button type="submit">Salvar</button>
        </form>

        <br>
        <a href="{% url 'lista_produtos' %}">Voltar para lista</a>
    </div>
</body>

</html>
